name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  build:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: cargo-spellcheck-linux
          path: target/release/cargo-spellcheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  cross-win64:
    name: Cross-compile (Windows x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - run: sudo apt-get install --yes gcc-mingw-w64-x86-64
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target x86_64-pc-windows-gnu

  validate-spellcheck:
    name: Validate spellcheck
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cargo-spellcheck-linux
          path: bin
      - run: chmod +x bin/cargo-spellcheck
      - name: Run spellcheck validation
        run: |
          EXE="bin/cargo-spellcheck"
          "${EXE}" --version
          "${EXE}" spellcheck demo/Cargo.toml
          "${EXE}" --dev-comments spellcheck demo/Cargo.toml
          "${EXE}" spellcheck demo/src/main.rs
          "${EXE}" --dev-comments spellcheck demo/src/main.rs
          "${EXE}" spellcheck demo/
          "${EXE}" --dev-comments spellcheck demo/
          "${EXE}" spellcheck
          "${EXE}" --dev-comments spellcheck
          "${EXE}"

  validate-reflow:
    name: Validate reflow
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cargo-spellcheck-linux
          path: bin
      - run: chmod +x bin/cargo-spellcheck
      - name: Run reflow validation
        run: |
          EXE="bin/cargo-spellcheck"
          "${EXE}" --version
          "${EXE}" reflow demo/Cargo.toml
          "${EXE}" reflow -vvvv demo/src/main.rs
          "${EXE}" reflow demo/
          "${EXE}" reflow demo/README.md
          "${EXE}"

  test-on-spearow-juice:
    name: Test on spearow/juice
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: spearow/juice
          path: juice
          fetch-depth: 3
      - uses: actions/download-artifact@v4
        with:
          name: cargo-spellcheck-linux
          path: bin
      - run: chmod +x bin/cargo-spellcheck
      - name: Run on spearow/juice
        run: |
          cd juice
          ../bin/cargo-spellcheck -vvv

  test-on-rustlang-rust:
    name: Test on rust-lang/rust
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: rust-lang/rust
          path: rust
          fetch-depth: 3
          submodules: false
      - uses: actions/download-artifact@v4
        with:
          name: cargo-spellcheck-linux
          path: bin
      - run: chmod +x bin/cargo-spellcheck
      - name: Init submodules
        run: git -C rust submodule update --init
      - name: Run on rust-lang/rust
        run: |
          cd rust
          ../bin/cargo-spellcheck -vvv
