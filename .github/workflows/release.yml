name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Stage artifact
        run: |
          cp target/x86_64-unknown-linux-gnu/release/cargo-spellcheck \
             "cargo-spellcheck-${{ github.ref_name }}-x86_64-unknown-linux-gnu"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: cargo-spellcheck-*-x86_64-unknown-linux-gnu

  build-windows:
    name: Build Windows binary (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - run: sudo apt-get install -y gcc-mingw-w64-x86-64
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target x86_64-pc-windows-gnu
      - name: Stage artifact
        run: |
          cp target/x86_64-pc-windows-gnu/release/cargo-spellcheck.exe \
             "cargo-spellcheck-${{ github.ref_name }}-x86_64-pc-windows-gnu.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: cargo-spellcheck-*-x86_64-pc-windows-gnu.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binary
      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
      - uses: softprops/action-gh-release@v2
        with:
          name: cargo-spellcheck-${{ github.ref_name }}
          files: |
            cargo-spellcheck-*-x86_64-unknown-linux-gnu
            cargo-spellcheck-*-x86_64-pc-windows-gnu.exe
